<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Платежи</title>
</head>
<body>

<h1>Управление платежами</h1>

<!-- Добавление -->
<form method="post" action="/payments/add">
    <input type="number" name="requestId" placeholder="ID заявки" required>
    <input type="date" name="paymentDate" required>
    <input type="number" step="0.01" name="paymentAmount" placeholder="Сумма" required>
    <input type="text" name="paymentMethod" placeholder="Метод оплаты">
    <input type="submit" value="Добавить">
</form>

<h2>Список платежей</h2>

<ul>
    <li th:each="p : ${payments}">
        <span th:text="'ID: ' + ${p.idPayment} +
                       ' | Заявка: ' + ${p.idRequest} +
                       ' | Дата: ' + ${p.paymentDate} +
                       ' | Сумма: ' + ${p.paymentAmount} +
                       ' | Метод: ' + ${p.paymentMethod}"></span>

        <!-- Обновление -->
        <form method="post" action="/payments/update">
            <input type="hidden" name="id" th:value="${p.idPayment}">
            <input type="number" name="requestId" th:value="${p.idRequest}">
            <input type="date" name="paymentDate" th:value="${p.paymentDate}">
            <input type="number" step="0.01" name="paymentAmount" th:value="${p.paymentAmount}">
            <input type="text" name="paymentMethod" th:value="${p.paymentMethod}">
            <input type="submit" value="Изменить">
        </form>

        <!-- Удаление -->
        <form method="post" action="/payments/delete">
            <input type="hidden" name="id" th:value="${p.idPayment}">
            <input type="submit" value="Удалить">
        </form>
    </li>
</ul>

</body>
</html>
