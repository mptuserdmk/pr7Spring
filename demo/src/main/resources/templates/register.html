<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Barbershop — Регистрация</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .auth-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .auth-card {
            width: 100%;
            max-width: 420px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 8px 40px rgba(0,0,0,0.4);
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 8px;
            font-size: 2.4rem;
        }
        .auth-title {
            text-align: center;
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: #fff;
        }
        .auth-subtitle {
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }
        .alert-error {
            background: rgba(255, 77, 79, 0.15);
            border: 1px solid rgba(255, 77, 79, 0.4);
            color: #ff7875;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .pass-hint {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.4);
            margin-top: 4px;
        }
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            color: rgba(255,255,255,0.5);
            font-size: 0.88rem;
        }
        .auth-footer a {
            color: #ff758c;
            text-decoration: none;
            font-weight: 600;
        }
        .auth-footer a:hover { text-decoration: underline; }
        .btn-full { width: 100%; margin-top: 8px; font-size: 1rem; padding: 14px; }
    </style>
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-logo">✂️</div>
        <div class="auth-title">Создать аккаунт</div>
        <div class="auth-subtitle">Barbershop CRM</div>

        <div class="alert-error" th:if="${error}" th:text="${error}"></div>

        <form th:action="@{/register}" method="post">
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input id="email" type="email" name="email" class="form-control"
                       placeholder="your@email.com" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Пароль</label>
                <input id="password" type="password" name="password" class="form-control"
                       placeholder="••••••••" required minlength="8">
                <span class="pass-hint">Минимум 8 символов</span>
            </div>
            <div class="form-group">
                <label class="form-label" for="confirmPassword">Подтвердите пароль</label>
                <input id="confirmPassword" type="password" name="confirmPassword" class="form-control"
                       placeholder="••••••••" required minlength="8">
            </div>
            <button type="submit" class="btn btn-full">Зарегистрироваться</button>
        </form>

        <div class="auth-footer">
            Уже есть аккаунт? <a th:href="@{/login}">Войти</a>
        </div>
    </div>
</div>
</body>
</html>
