<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Barbershop — Панель администратора</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .role-select {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 6px 10px;
            border-radius: 8px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            outline: none;
            cursor: pointer;
        }
        .role-select:focus { border-color: #ff758c; }
        .role-select option { background: #302b63; color: #fff; }
        .badge-admin {
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
            color: #fff; padding: 3px 10px; border-radius: 20px; font-size: 0.78rem; font-weight: 600;
        }
        .badge-moderator {
            background: rgba(250, 173, 20, 0.25);
            border: 1px solid rgba(250, 173, 20, 0.5);
            color: #ffd666; padding: 3px 10px; border-radius: 20px; font-size: 0.78rem; font-weight: 600;
        }
        .badge-user {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.7); padding: 3px 10px; border-radius: 20px; font-size: 0.78rem;
        }
        .alert-success {
            background: rgba(82,196,26,0.15); border: 1px solid rgba(82,196,26,0.4);
            color: #95de64; padding: 12px 16px; border-radius: 10px; margin-bottom: 20px;
        }
        .alert-error {
            background: rgba(255,77,79,0.15); border: 1px solid rgba(255,77,79,0.4);
            color: #ff7875; padding: 12px 16px; border-radius: 10px; margin-bottom: 20px;
        }
        .admin-badge {
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
            color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 0.78rem; font-weight: 600;
            margin-left: 8px; vertical-align: middle;
        }
        .btn-sm { padding: 6px 14px; font-size: 0.85rem; border-radius: 8px; }
        .inline-form { display: flex; align-items: center; gap: 8px; }
        .actions { display: flex; gap: 8px; align-items: center; }
        .nav-user { display: flex; align-items: center; gap: 12px; }
        .nav-email { color: rgba(255,255,255,0.7); font-size: 0.9rem; }
        .btn-logout { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: #fff; padding: 6px 14px; border-radius: 8px; text-decoration: none; font-size: 0.85rem;
            transition: 0.3s; }
        .btn-logout:hover { background: rgba(255,77,79,0.3); border-color: rgba(255,77,79,0.5); }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h2>✂️ Barbershop <span class="admin-badge">Admin</span></h2>
        <div class="nav-links">
            <a th:href="@{/services}">Услуги</a>
            <a th:href="@{/appointments}">Записи</a>
            <a th:href="@{/categories}">Категории</a>
            <a th:href="@{/users}">Пользователи</a>
            <a th:href="@{/portfolios}">Портфолио</a>
            <a th:href="@{/admin/users}">⚙ Панель администратора</a>
        </div>
        <div class="nav-user">
            <span class="nav-email" sec:authentication="name"></span>
            <a th:href="@{/logout}" class="btn-logout">Выйти</a>
        </div>
    </header>

    <h1>⚙️ Управление пользователями</h1>

    <div class="alert-success" th:if="${success}" th:text="${success}"></div>
    <div class="alert-error" th:if="${error}" th:text="${error}"></div>

    <table class="table" th:if="${not #lists.isEmpty(users)}">
        <thead>
        <tr>
            <th>ID</th>
            <th>Email</th>
            <th>Текущая роль</th>
            <th>Изменить роль</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="u : ${users}">
            <td th:text="${u.id}"></td>
            <td th:text="${u.email}"></td>
            <td>
                <span class="badge-admin" th:if="${u.role.name() == 'ROLE_ADMIN'}">ADMIN</span>
                <span class="badge-moderator" th:if="${u.role.name() == 'ROLE_MODERATOR'}">MODERATOR</span>
                <span class="badge-user" th:if="${u.role.name() == 'ROLE_USER'}">USER</span>
            </td>
            <td>
                <form th:action="@{/admin/users/{id}/role(id=${u.id})}" method="post" class="inline-form">
                    <select name="role" class="role-select">
                        <option th:each="r : ${roles}"
                                th:value="${r.name()}"
                                th:text="${r.name().replace('ROLE_', '')}"
                                th:selected="${r == u.role}"></option>
                    </select>
                    <button type="submit" class="btn btn-sm">Сохранить</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="empty-state" th:if="${#lists.isEmpty(users)}">Пользователей нет.</div>
</div>
</body>
</html>
