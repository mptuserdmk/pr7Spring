<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Отзывы</title>
</head>
<body>
<h1>Отзывы пользователей</h1>

<!-- Форма добавления нового отзыва -->
<h2>Добавить отзыв</h2>
<form method="post" th:action="@{/reviews/add}">
    <label for="userId">Пользователь:</label>
    <input type="number" id="userId" name="userId" required>
    <br>

    <label for="comment">Комментарий:</label>
    <input type="text" id="comment" name="comment" required>
    <br>

    <label for="rating">Оценка (1-5):</label>
    <input type="number" id="rating" name="rating" min="1" max="5" required>
    <br>

    <input type="submit" value="Добавить">
</form>

<hr>

<!-- Список отзывов -->
<h2>Список отзывов</h2>
<ul>
    <li th:each="r : ${reviews}">
        <span th:text="'ID: ' + ${r.idReview} + ' | Пользователь: ' + ${r.userId}
                      + ' | Комментарий: ' + ${r.comment} + ' | Оценка: ' + ${r.rating}"></span>

        <!-- Форма удаления -->
        <form method="post" th:action="@{/reviews/delete}" style="display:inline;">
            <input type="hidden" name="id" th:value="${r.idReview}">
            <input type="submit" value="Удалить">
        </form>
    </li>
</ul>

</body>
</html>
