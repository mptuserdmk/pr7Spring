<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Записи к мастеру</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .pagination {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            gap: 5px;
        }
        .pagination a, .pagination span {
            padding: 8px 12px;
            border: 1px solid #ddd;
            text-decoration: none;
            color: #333;
            border-radius: 4px;
        }
        .pagination a.active {
            background-color: #007bff;
            color: white;
            border-color: #007bff;
        }
        .pagination a:hover:not(.active) {
            background-color: #f1f1f1;
        }
        .actions {
            display: flex;
            gap: 10px;
        }
        .btn-edit { background-color: #ffc107; color: #000; }
        .btn-delete { background-color: #dc3545; color: #fff; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h2>✂️ Barbershop</h2>
        <div class="nav-links">
            <a th:href="@{/services}">Услуги</a>
            <a th:href="@{/appointments}">Записи</a>
            <a th:href="@{/categories}">Категории</a>
            <a th:href="@{/users}" sec:authorize="hasAnyRole('MODERATOR','ADMIN')">Пользователи</a>
            <a th:href="@{/portfolios}">Портфолио</a>
            <a th:href="@{/admin/users}" sec:authorize="hasRole('ADMIN')">⚙ Администрирование</a>
        </div>
        <div style="display:flex;align-items:center;gap:10px;">
            <span style="color:rgba(255,255,255,0.6);font-size:0.85rem;" sec:authentication="name"></span>
            <a th:href="@{/logout}" style="color:#ff758c;text-decoration:none;font-size:0.85rem;">Выйти</a>
        </div>
    </header>

    <h1>Список записей</h1>
    
    <form class="search-form" th:action="@{/appointments}" method="get">
        <input type="text" name="search" th:value="${search}" class="search-input" placeholder="Поиск по статусу...">
        <button type="submit" class="btn">Найти</button>
    </form>
    
    <div style="margin-bottom: 20px;" sec:authorize="hasAnyRole('MODERATOR','ADMIN')">
        <a th:href="@{/appointments/book}" class="btn">Новая запись</a>
    </div>

    <table class="table" th:if="${not #lists.isEmpty(appointments)}">
        <thead>
        <tr>
            <th>ID</th>
            <th>Дата и время</th>
            <th>Клиент</th>
            <th>Мастер</th>
            <th>Услуга</th>
            <th>Статус</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="appointment : ${appointments}">
            <td th:text="${appointment.id}"></td>
            <td th:text="${appointment.dateTime}"></td>
            <td th:text="${appointment.client != null ? appointment.client.email : 'Нет'}"></td>
            <td th:text="${appointment.master != null ? appointment.master.email : 'Нет'}"></td>
            <td th:text="${appointment.service != null ? appointment.service.name : 'Нет'}"></td>
            <td th:text="${appointment.status}"></td>
            <td class="actions">
                <a th:href="@{/appointments/edit/{id}(id=${appointment.id})}" class="btn btn-edit"
                   sec:authorize="hasAnyRole('MODERATOR','ADMIN')">Ред.</a>
                <a th:href="@{/appointments/delete/{id}(id=${appointment.id})}" class="btn btn-delete"
                   onclick="return confirm('Удалить?')"
                   sec:authorize="hasAnyRole('MODERATOR','ADMIN')">Удалить</a>
            </td>
        </tr>
        </tbody>
    </table>
    
    <div class="pagination" th:if="${totalPages > 0}">
        <a th:if="${currentPage > 0}" th:href="@{/appointments(page=${currentPage - 1}, search=${search})}">&laquo; Пред.</a>
        
        <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
            <a th:href="@{/appointments(page=${i}, search=${search})}" 
               th:text="${i + 1}" 
               th:classappend="${i == currentPage} ? 'active' : ''"></a>
        </span>
        
        <a th:if="${currentPage < totalPages - 1}" th:href="@{/appointments(page=${currentPage + 1}, search=${search})}">След. &raquo;</a>
    </div>
    
    <div class="empty-state" th:if="${#lists.isEmpty(appointments)}">
        Ничего не найдено.
    </div>

</div>
</body>
</html>
