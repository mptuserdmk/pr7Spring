<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Услуги ремонта</title>
</head>
<body>

<h1>Управление услугами</h1>

<!-- Добавление -->
<form method="post" action="/repair_services/add">
    <input type="text" name="name" placeholder="Название услуги" required>
    <input type="number" step="0.01" name="price" placeholder="Цена" required>
    <input type="submit" value="Добавить">
</form>

<h2>Список услуг</h2>

<ul>
    <li th:each="s : ${services}">
        <span th:text="'ID: ' + ${s.idService} +
                       ' | ' + ${s.name} +
                       ' | Цена: ' + ${s.price}"></span>

        <!-- Обновление -->
        <form method="post" action="/repair_services/update">
            <input type="hidden" name="id" th:value="${s.idService}">
            <input type="text" name="name" th:value="${s.name}">
            <input type="number" step="0.01" name="price" th:value="${s.price}">
            <input type="submit" value="Изменить">
        </form>

        <!-- Удаление -->
        <form method="post" action="/repair_services/delete">
            <input type="hidden" name="id" th:value="${s.idService}">
            <input type="submit" value="Удалить">
        </form>
    </li>
</ul>

</body>
</html>
